name: 自动编译 Simple Live APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  release:
    types: [published]

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [simple_live_app]   # 可添加 simple_live_tv_app
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.3'

      - name: 获取依赖
        working-directory: ${{ matrix.project }}
        run: flutter pub get

      - name: 生成 local.properties
        working-directory: ${{ matrix.project }}
        run: echo "flutter.sdk=${{ env.FLUTTER_HOME }}" > android/local.properties

      - name: 生成 debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" -storepass android -keypass android

      - name: 编译 Android APK
        working-directory: ${{ matrix.project }}
        run: flutter build apk --release

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-${{ matrix.project == 'simple_live_app' && 'mobile' || 'tv' }}
          path: ${{ matrix.project }}/build/app/outputs/flutter-apk/app-release.apk
