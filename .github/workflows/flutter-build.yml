name: Flutter Build (AAB / APK)

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FLUTTER_CHANNEL: stable

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simple_live_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies for Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip xz-utils libglu1-mesa

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_CHANNEL }}

      - name: Flutter --version
        run: flutter --version

      - name: Accept Android licenses
        run: yes | sudo $ANDROID_SDK_ROOT/tools/bin/sdkmanager --licenses || true
        env:
          ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk

      - name: Enable Android emulator dependencies (skip emulator run)
        run: |
          flutter config --no-analytics
          flutter config --enable-web # optional
          flutter pub get

      - name: Decode keystore (if provided)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ./android/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: ./simple_live_app/android

      - name: Create key.properties for signing (if provided)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat > key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        working-directory: ./simple_live_app/android

      - name: Get Flutter packages
        run: flutter pub get

      - name: Run Flutter analyze (optional)
        run: flutter analyze || true

      - name: Build AAB (release)
        run: flutter build appbundle --release
        continue-on-error: false

      - name: Build APK (release, optional)
        run: flutter build apk --release || true

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple_live_app-aab
          path: simple_live_app/build/app/outputs/bundle/release/*.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple_live_app-apk
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk
